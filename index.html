<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petrol Premium — Ops Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap');

:root {
  --bg:#0f0f0d; --surface:#181816; --surface2:#222220;
  --border:#2e2e2a; --border2:#3a3a36;
  --text:#e8e6df; --muted:#7a7870; --accent:#C8FF00;
  --harvest-c:#52B788; --harvest-bg:rgba(82,183,136,0.12); --harvest-b:rgba(82,183,136,0.3);
  --buck-c:#F4A820;    --buck-bg:rgba(244,168,32,0.12);    --buck-b:rgba(244,168,32,0.3);
  --flip-c:#4A90D9;    --flip-bg:rgba(74,144,217,0.12);    --flip-b:rgba(74,144,217,0.3);
  --fungicide-c:#E07B54; --fungicide-bg:rgba(224,123,84,0.12);
  --drench-c:#7B68EE;    --drench-bg:rgba(123,104,238,0.12);
  --foliar-c:#5DCAA5;    --foliar-bg:rgba(93,202,165,0.12);
  --ipm-c:#E07B54;       --ipm-bg:rgba(224,123,84,0.12);
  --clone-c:#D4A5F5;     --clone-bg:rgba(212,165,245,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);gap:16px}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.brand-accent{color:var(--accent)}
.brand-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.sync-dot{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase}
.sync-dot.live{color:var(--harvest-c)} .sync-dot.error{color:#E24B4A} .sync-dot.loading{color:var(--muted)}
.sync-pip{width:6px;height:6px;border-radius:50%;background:currentColor}
.sync-dot.loading .sync-pip{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
.date-display{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;margin-left:auto}
.date-display span{color:var(--accent);font-weight:700}

/* NAV */
.nav{display:flex;gap:2px;padding:10px 24px 0;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.nav-tab{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:7px 16px 9px;cursor:pointer;color:var(--muted);border-radius:4px 4px 0 0;border:1px solid transparent;border-bottom:none;transition:color 0.15s;user-select:none}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);background:var(--bg);border-color:var(--border);border-bottom-color:var(--bg);margin-bottom:-1px}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px}
.view{display:none} .view.active{display:block}

/* TODAY HEADER */
.today-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.today-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;line-height:1}
.today-dow{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.today-note{font-size:12px;color:var(--muted);font-style:italic}
.track-toggle{display:flex;margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px}
.track-btn{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:4px;cursor:pointer;color:var(--muted);transition:all 0.15s;user-select:none;border:none;background:none}
.track-btn.active{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.track-btn.harvest-mode{color:var(--harvest-c)!important;border-color:rgba(82,183,136,0.4)!important}

/* ROOM GRID */
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* ROOM CARD */
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.2s;animation:fadeUp 0.3s ease both}
.room-card:hover{border-color:var(--border2)} .room-card.offline{opacity:0.38}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.room-card-header{display:flex;align-items:center;gap:10px;padding:11px 14px 10px;border-bottom:1px solid var(--border)}
.room-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.room-id{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px}
.room-phase{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-left:auto}
.room-card-body{padding:12px 14px}
.room-objective{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:10px;line-height:1.55}
.plant-work-badge{display:flex;align-items:center;gap:6px;background:rgba(200,255,0,0.07);border:1px solid rgba(200,255,0,0.2);border-radius:4px;padding:5px 10px;margin-bottom:10px;font-size:11px;font-weight:500;color:#b8ec00}

/* TASK SECTIONS */
.task-section-header{display:flex;align-items:center;gap:8px;padding:8px 0 4px}
.task-section-header:first-child{padding-top:0}
.tsh-line{flex:1;height:1px;background:var(--border)}
.tsh-label{font-family:'DM Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.tsh-label.accent{color:var(--accent)}
.tasks-list{display:flex;flex-direction:column;gap:5px}
.task-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:5px;border:1px solid transparent;cursor:pointer;transition:all 0.15s;flex-wrap:wrap}
.task-item:hover{filter:brightness(1.1)} .task-item.done{opacity:0.4} .task-item.done .task-label{text-decoration:line-through}
.task-check{width:16px;height:16px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all 0.15s}
.task-item.done .task-check::after{content:'✓';font-weight:700}
.task-label{font-size:12px;font-weight:500;flex:1}
.task-optional{opacity:0.5;font-size:9px;font-style:italic;margin-left:2px}
.task-expand-icon{font-size:11px;color:var(--muted);cursor:pointer;padding:0 2px;opacity:0.45;transition:opacity 0.15s;flex-shrink:0}
.task-item.expanded .task-expand-icon{opacity:1;color:var(--accent)}
.task-tag{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:2px;opacity:0.85}
.task-detail{width:100%;padding:4px 26px 2px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);line-height:1.75;display:none}
.task-item.expanded .task-detail{display:block}
.no-tasks{text-align:center;padding:20px;color:var(--muted);font-size:12px;font-style:italic}

/* TASK COLORS */
.t-fungicide{background:var(--fungicide-bg);color:var(--fungicide-c);border-color:rgba(224,123,84,0.3)}
.t-drench{background:var(--drench-bg);color:var(--drench-c);border-color:rgba(123,104,238,0.3)}
.t-foliar{background:var(--foliar-bg);color:var(--foliar-c);border-color:rgba(93,202,165,0.3)}
.t-ipm{background:var(--ipm-bg);color:var(--ipm-c);border-color:rgba(224,123,84,0.3)}
.t-harvest{background:var(--harvest-bg);color:var(--harvest-c);border-color:var(--harvest-b)}
.t-buck{background:var(--buck-bg);color:var(--buck-c);border-color:var(--buck-b)}
.t-flip{background:var(--flip-bg);color:var(--flip-c);border-color:var(--flip-b)}
.t-clone{background:var(--clone-bg);color:var(--clone-c);border-color:rgba(212,165,245,0.3)}
.t-ops{background:var(--surface2);color:var(--muted);border-color:var(--border)}
.t-watch{background:rgba(200,255,0,0.06);color:#b8ec00;border-color:rgba(200,255,0,0.2)}

/* WEEK VIEW */
.week-header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
.week-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px}
.week-range{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px}
.week-grid{display:grid;grid-template-columns:80px repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.wg-header{background:var(--surface2);padding:8px 10px;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:center}
.wg-header.today-col{color:var(--accent);background:rgba(200,255,0,0.06)}
.wg-room-label{background:var(--surface);padding:10px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.wg-room-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px}
.wg-room-phase{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px}
.wg-cell{background:var(--surface);padding:7px;min-height:64px;display:flex;flex-direction:column;gap:3px}
.wg-cell.today-col{background:rgba(200,255,0,0.03)}
.wg-task{font-size:10px;font-weight:500;padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CALENDAR VIEW */
.cal-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.cal-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px}
.cal-nav{display:flex;gap:6px;margin-left:auto;align-items:center}
.cal-nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;transition:border-color 0.15s}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-month-name{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;min-width:160px;text-align:center}
.milestone-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.milestone-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 8px;font-size:11px}
.mp-dot{width:8px;height:8px;border-radius:50%}
.mp-room{font-family:'DM Mono',monospace;font-size:10px;font-weight:700}
.mp-label{color:var(--muted);font-size:10px}
.mp-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cal-dow{background:var(--surface2);text-align:center;padding:7px;font-family:'DM Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.cal-cell{background:var(--surface);min-height:90px;padding:7px}
.cal-cell.empty{background:var(--bg)} .cal-cell.weekend{background:rgba(255,255,255,0.01)}
.cal-cell.cal-today{background:rgba(200,255,0,0.04);outline:1px solid rgba(200,255,0,0.25);outline-offset:-1px}
.cal-day-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block}
.cal-cell.cal-today .cal-day-num{color:var(--accent)}
.cal-event{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.weekend-banner{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:40px;text-align:center;grid-column:1/-1}
.weekend-banner h2{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--muted);margin-bottom:8px}
.weekend-banner p{font-size:13px;color:var(--muted)}
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-name">Petrol <span class="brand-accent">Premium</span></div>
    <div class="brand-sub">Ops Board</div>
  </div>
  <div class="sync-dot loading" id="syncDot"><div class="sync-pip"></div><span id="syncLabel">Loading…</span></div>
  <div class="date-display" id="dateDisplay"></div>
</div>

<div class="nav">
  <div class="nav-tab active" data-view="today">Today</div>
  <div class="nav-tab" data-view="week">This Week</div>
  <div class="nav-tab" data-view="calendar">Calendar</div>
</div>

<div class="main">
  <div class="view active" id="view-today">
    <div class="today-header">
      <div class="today-title" id="todayTitle">Today</div>
      <div class="today-dow" id="todayDow"></div>
      <div class="today-note" id="todayNote"></div>
      <div class="track-toggle">
        <button class="track-btn active" id="btnGrow" onclick="setTrack('grow')">Grow</button>
        <button class="track-btn" id="btnHarvest" onclick="setTrack('harvest')">Harvest</button>
      </div>
    </div>
    <div class="rooms-grid" id="roomsGrid"></div>
  </div>
  <div class="view" id="view-week">
    <div class="week-header"><div class="week-title">This Week</div><div class="week-range" id="weekRange"></div></div>
    <div id="weekGrid"></div>
  </div>
  <div class="view" id="view-calendar">
    <div class="cal-header">
      <div class="cal-title">Calendar</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" id="calPrev">← Prev</button>
        <div class="cal-month-name" id="calMonthName"></div>
        <button class="cal-nav-btn" id="calNext">Next →</button>
      </div>
    </div>
    <div class="milestone-strip" id="milestoneStrip"></div>
    <div id="calGrid"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const SHEET_ID='1Gv6DtVWWmAh4Zfoiu3nRTvIRd3yX6w52HwTIY5xAJZY';
const GID_FH='0', GID_TD='2062498108';

const ROOM_META={
  '1':{id:'F1',color:'#4A90D9',flipDow:0},'2':{id:'F2',color:'#9B7FE8',flipDow:2},
  '3':{id:'F3',color:'#52B788',flipDow:0},'4':{id:'F4',color:'#F4A820',flipDow:2},
  '4W':{id:'F4W',color:'#E07B54',flipDow:2},'5':{id:'F5',color:'#C084F5',flipDow:0},
  '6':{id:'F6',color:'#A78BFA',flipDow:0},
};
const ROOM_ORDER=['F1','F2','F3','F4','F4W','F5','F6'];

// ── WEEK DEFINITIONS (static SOP) ─────────────────────────────────────────
const WEEK_DEF={
  1:{label:'Week 1 · Days 1–7',objective:'Flush veg salts · teach dry back · initiate stretch',heavy:true,heavyLabel:'Heavy plant work week',
    plantWork:['Set trellis','Position pots','First lollipop / prune'],
    sprays:{
      spray1:{label:'Fungicide — Silver Bullet',tag:'fungicide',cls:'t-fungicide',products:['Silver Bullet @ 1 tsp/gal'],notes:'Lights off · WPS posted · REI signage'},
      drench:{label:'Drench — 500 mL/pot',tag:'drench',cls:'t-drench',products:['Terra Grow @ 1 cup/40 gal','RootShield @ ½ cup/40 gal'],notes:'Hand feed 500 mL/pot · full saturation for inoculant'},

    sprays:{
      spray1:{label:'Fungicide — Silver Bullet',tag:'fungicide',cls:'t-fungicide',products:['Silver Bullet @ 1 tsp/gal'],notes:'Lights off · WPS posted · REI signage'},
      drench:{label:'Drench — 500 mL/pot',tag:'drench',cls:'t-drench',products:['Terra Grow @ 1 cup/40 gal','Botaniguard 22WP @ ½ cup/40 gal'],notes:'Hand feed 500 mL/pot'},
      foliar:{label:'Foliar — Canna Boost + Si',tag:'foliar',cls:'t-foliar',products:['Canna Boost @ 10 mL/gal','Front Row Si @ 1 mL/gal'],notes:'Before lights on or dimmed to 30%'},
      spray2:{label:'IPM — Botaniguard Maxx',tag:'ipm',cls:'t-ipm',products:['Botaniguard Maxx @ 10 mL/gal'],notes:'Lights off · WPS posted · REI signage',optional:true},
    }},
  3:{label:'Week 3 · Days 15–21',objective:'Canopy control · increase mL · dry backs · focus stack · prep bulk',heavy:true,heavyLabel:'Heavy plant work week',
    plantWork:['Trellis work','Main scrog'],

      drench:{label:'Drench — 1,000 mL/pot',tag:'drench',cls:'t-drench',products:['Canna Boost @ 10 mL/gal','New Millennium Decision @ 5 mL/gal','Front Row Si @ 1 mL/gal'],notes:'Hand feed 1,000 mL/pot'},
      foliar:{label:'Foliar — Canna Boost + Si',tag:'foliar',cls:'t-foliar',products:['Canna Boost @ 10 mL/gal','Front Row Si @ 1 mL/gal'],notes:'Before lights on or dimmed to 30%'},
    }},
  4:{label:'Week 4 · Days 22–28',objective:'Max light penetration & airflow · monitor runoff EC · add P2 events',heavy:true,heavyLabel:'Heavy plant work week',
    plantWork:['Week 4 big leaf','Canopy management'],
    sprays:{drench:{label:'Drench — 1,000 mL/pot',tag:'drench',cls:'t-drench',products:['Cannazym @ 10 mL/gal','Canna Boost @ 10 mL/gal'],notes:'Hand feed 1,000 mL/pot · monitor runoff EC'}},
    watchItems:['Humidity > 70%','High temp > 82°F','Maintain daily runoff','Runoff EC > 4.5']},
  5:{label:'Week 5 · Days 29–35',objective:'Bulk phase · canopy management · PM scouting',heavy:false,
    plantWork:['Canopy management','Scout for PM'],
    sprays:{drench:{label:'Drench — 1,500 mL/pot',tag:'drench',cls:'t-drench',products:['Cannazym @ 10 mL/gal','Canna Boost @ 10 mL/gal'],notes:'Hand feed 1,500 mL/pot'}},
    watchItems:['Humidity > 65%','High temp > 82°F','Maintain daily runoff','Runoff EC > 4.5']},
  6:{label:'Week 6 · Days 36–42',objective:'Bulk phase · CO₂ off day 42–45 · PM scouting',heavy:false,
    plantWork:['Canopy management','Scout for PM','CO₂ off — day 42–45'],
    sprays:{drench:{label:'Drench — 1,500 mL/pot',tag:'drench',cls:'t-drench',products:['Cannazym @ 10 mL/gal','Canna Boost @ 10 mL/gal'],notes:'Hand feed 1,500 mL/pot'}},

const HARVEST_TASKS={
  HARVEST:[
    {label:'Raise / remove lights',tag:'harvest',cls:'t-harvest',products:[],notes:'Prep room for cutdown'},
    {label:'Remove trellis nets',tag:'harvest',cls:'t-harvest',products:[],notes:''},
    {label:'Chop & hang / rack to dry room',tag:'harvest',cls:'t-harvest',products:[],notes:'Log room + weight in METRC'},
    {label:'METRC harvest tag',tag:'harvest',cls:'t-harvest',products:[],notes:'Required before moving product'},
    {label:'Sanitize room',tag:'harvest',cls:'t-harvest',products:[],notes:'After last plant removed'},
  ],
  BUCK:[
    {label:'Buck — remove from stems',tag:'buck',cls:'t-buck',products:[],notes:'F4/F4W: 1 day · all others: 2 days'},
    {label:'Transfer to cure bins / bags',tag:'buck',cls:'t-buck',products:[],notes:'Label with room + date'},
    {label:'Log weight in METRC',tag:'buck',cls:'t-buck',products:[],notes:''},
  ],

    {label:'Lower lights to flip position',tag:'flip',cls:'t-flip',products:[],notes:''},
    {label:'Flip lights to 12/12',tag:'flip',cls:'t-flip',products:[],notes:'Log flip date in schedule'},
    {label:'METRC room tag',tag:'flip',cls:'t-flip',products:[],notes:''},
  ],
};

// ── STATE ─────────────────────────────────────────────────────────────────
let CYCLES=[], CAL_EVENTS={};

// ── HELPERS ───────────────────────────────────────────────────────────────
function dk(d){if(!d)return null;return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function pd(s){
  if(!s||!s.trim())return null;
  const full=s.match(/\w+,\s+(\w+)\s+(\d+),\s+(\d{4})/);
  if(full){const mo={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};return new Date(+full[3],mo[full[1]],+full[2]);}
  const sl=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(sl){let[,m,d,y]=sl;if(y.length===2)y='20'+y;return new Date(+y,+m-1,+d);}
  const r=new Date(s);return isNaN(r.getTime())?null:r;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtShort(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
const DOW_NAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DOW_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── SHEET FETCH ───────────────────────────────────────────────────────────

// Parse a gviz JSON response (more reliable than CSV for date values)
async function fetchTabJSON(gid){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status} fetching gid=${gid}`);
  const text=await res.text();
  // gviz wraps response in /*O_o*/\ngoogle.visualization.Query.setResponse({...});
  const json=JSON.parse(text.replace(/^[^{]*|[^}]*$/g,''));
  const cols=json.table.cols.map(c=>c.label||'');
  const rows=json.table.rows||[];
  // Return array of objects keyed by column label
  return rows.map(row=>{
    const obj={};
    row.c.forEach((cell,i)=>{
      if(!cols[i]) return;
      // cell.v for value, cell.f for formatted string
      // Dates come as Date(year,month,day) — use formatted string which is human readable
      obj[cols[i]]=cell?.f || cell?.v || null;
    });
    return obj;
  });
}

// Robust date parser handling multiple formats
function pd(s){
  if(!s) return null;
  s=String(s).trim();
  if(!s||s==='null') return null;

  // "Monday, March 9, 2026" or "March 9, 2026"
  const mo={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
  const full=s.match(/(?:\w+,\s+)?(\w+)\s+(\d+),?\s+(\d{4})/);
  if(full&&mo[full[1]]!==undefined) return new Date(+full[3],mo[full[1]],+full[2]);

  // M/D/YY or M/DD/YYYY
  const sl=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(sl){let[,m,d,y]=sl;if(y.length===2)y='20'+y;return new Date(+y,+m-1,+d);}

  // YYYY-MM-DD
  const dash=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(dash) return new Date(+dash[1],+dash[2]-1,+dash[3]);

  // Last resort
  const r=new Date(s);
  return isNaN(r.getTime())?null:r;
}

async function loadData(){
  setSyncState('loading','Loading…');

  const[fhObjs,tdObjs]=await Promise.all([
    fetchTabJSON(GID_FH),
    fetchTabJSON(GID_TD),
  ]);

  console.log('FH rows fetched:',fhObjs.length, 'sample:', JSON.stringify(fhObjs[0]));
  console.log('TD rows fetched:',tdObjs.length, 'sample:', JSON.stringify(tdObjs[0]));

  // Filter to rows that have a Room value
  const fhData=fhObjs.filter(r=>r['Room']&&String(r['Room']).trim());
  const tdData=tdObjs.filter(r=>r['Room']&&String(r['Room']).trim());

  console.log('FH data rows:',fhData.length,'TD data rows:',tdData.length);

  const cycles=[];
  for(let i=0;i<Math.min(fhData.length,tdData.length);i++){
    const fh=fhData[i], td=tdData[i];
    const rk=String(fh['Room']||'').trim();
    const trk=String(td['Room']||'').trim();

    // Allow minor mismatch — just check the room key matches
    if(rk!==trk){
      console.warn(`Row ${i} room mismatch: FH="${rk}" TD="${trk}"`);
      continue;
    }

    const meta=ROOM_META[rk];
    if(!meta){console.warn(`Unknown room key: "${rk}"`);continue;}

    const flipDate     =pd(fh['Flip Date']);
    const harvestDate  =pd(fh['Harvest Date']);
    const cloneDate    =pd(td['Clone Date']);
    const transplantDate=pd(td['Transplant Date']);
    const wk1End       =pd(td['Week 1 End']);
    const wk2End       =pd(td['Week 2 End']);
    const wk3End       =pd(td['Week 3 End']);
    const wk4End       =pd(td['Week 4 End']);

    if(!flipDate){console.warn(`Row ${i} (${rk}): no flip date`);continue;}

    cycles.push({...meta,cloneDate,transplantDate,flipDate,harvestDate,wk1End,wk2End,wk3End,wk4End});
  }

  console.log('Cycles built:',cycles.length);
  CYCLES=cycles;
  buildCalEvents();
  return cycles.length;
}

function buildCalEvents(){
  CAL_EVENTS={};
  const add=(date,type,id)=>{
    if(!date)return;const k=dk(date);
    if(!CAL_EVENTS[k])CAL_EVENTS[k]={};
    if(!CAL_EVENTS[k][type])CAL_EVENTS[k][type]=[];
    if(!CAL_EVENTS[k][type].includes(id))CAL_EVENTS[k][type].push(id);
  };
  CYCLES.forEach(c=>{
    if(c.harvestDate){add(c.harvestDate,'HARVEST',c.id);add(addDays(c.harvestDate,1),'HARVEST',c.id);}
    if(c.harvestDate){const bs=addDays(c.harvestDate,2),bd=(c.id==='F4'||c.id==='F4W')?1:2;for(let b=0;b<bd;b++)add(addDays(bs,b),'BUCK',c.id);}
    if(c.flipDate)add(c.flipDate,'FLIP',c.id);
    if(c.cloneDate){add(c.cloneDate,'CLONE',c.id);add(addDays(c.cloneDate,1),'CLONE',c.id);}
    if(c.transplantDate){add(c.transplantDate,'TRANSPLANT',c.id);add(addDays(c.transplantDate,1),'TRANSPLANT',c.id);add(addDays(c.transplantDate,2),'TRANSPLANT',c.id);}
  });
}

// ── ROOM STATE ENGINE ─────────────────────────────────────────────────────
function getActiveCycle(roomId,date){
  return CYCLES.find(c=>{
    if(c.id!==roomId)return false;
    const start=c.cloneDate||c.flipDate;
    const end=c.harvestDate?addDays(c.harvestDate,4):addDays(c.flipDate,70);
    return start&&end&&date>=start&&date<=end;
  })||null;
}

function getWeekInfo(cycle,date){
  if(!cycle)return null;
  if(cycle.cloneDate&&date<cycle.cloneDate)return null;
  if(cycle.transplantDate&&date<=cycle.transplantDate)return{phase:'clone',weekNum:null};
  if(cycle.flipDate&&date<cycle.flipDate)return{phase:'transplant',weekNum:null};
  if(cycle.flipDate&&dk(date)===dk(cycle.flipDate))return{phase:'flip',weekNum:0};
  if(cycle.flipDate&&date>cycle.flipDate){
    if(cycle.wk1End&&date<=cycle.wk1End)return{phase:'flower',weekNum:1};
    if(cycle.wk2End&&date<=cycle.wk2End)return{phase:'flower',weekNum:2};
    if(cycle.wk3End&&date<=cycle.wk3End)return{phase:'flower',weekNum:3};
    if(cycle.wk4End&&date<=cycle.wk4End)return{phase:'flower',weekNum:4};
    if(cycle.wk4End){
      if(date<=addDays(cycle.wk4End,7))return{phase:'flower',weekNum:5};
      if(date<=addDays(cycle.wk4End,14))return{phase:'flower',weekNum:6};
    }
    if(!cycle.harvestDate||date<=cycle.harvestDate)return{phase:'flower',weekNum:7};
  }
  return null;
}

function flowerDay(cycle,date){
  if(!cycle?.flipDate)return null;
  const d=Math.round((date-cycle.flipDate)/86400000);
  return d>=1?d:null;
}

// ── SPRAY ENGINE ──────────────────────────────────────────────────────────
function getSprayTasks(cycle,date,weekNum){
  if(!weekNum||weekNum<1||weekNum>7)return[];
  const wk=WEEK_DEF[weekNum];if(!wk?.sprays)return[];
  const dow=date.getDay(),isWed=cycle.flipDow===2,tasks=[];
  if(wk.sprays.spray1){const fd=(isWed&&weekNum===1)?5:2;if(dow===fd)tasks.push(wk.sprays.spray1);}
  if(wk.sprays.drench&&dow===3)tasks.push(wk.sprays.drench);
  if(wk.sprays.foliar&&dow===4&&weekNum<=3)tasks.push(wk.sprays.foliar);
  if(wk.sprays.spray2&&dow===5)tasks.push(wk.sprays.spray2);
  return tasks;
}

// ── TASK HTML ─────────────────────────────────────────────────────────────
let _tid=0;
function taskHTML(t){
  const id='tk-'+(_tid++);
  const hasD=t.products?.length>0||t.notes;
  const opt=t.optional?'<span class="task-optional">(optional)</span>':'';
  const exp=hasD?`<span class="task-expand-icon" onclick="event.stopPropagation();document.getElementById('${id}').classList.toggle('expanded')">⋯</span>`:'';
  let det='';
  if(hasD){
    const p=(t.products||[]).map(p=>`<div>· ${p}</div>`).join('');
    const n=t.notes?`<div style="margin-top:3px;opacity:0.6">${t.notes}</div>`:'';
    det=`<div class="task-detail">${p}${n}</div>`;
  }
  return`<div class="task-item ${t.cls}" id="${id}" onclick="this.classList.toggle('done')">
    <div class="task-check"></div>
    <span class="task-label">${t.label}${opt}</span>
    ${exp}<span class="task-tag ${t.cls}">${t.tag}</span>${det}
  </div>`;
}
function sectionHdr(label,accent=false){
  return`<div class="task-section-header"><div class="tsh-line"></div><div class="tsh-label${accent?' accent':''}">${label}</div><div class="tsh-line"></div></div>`;
}

// ── TODAY VIEW ────────────────────────────────────────────────────────────
let currentTrack='grow';
function setTrack(t){
  currentTrack=t;
  document.getElementById('btnGrow').classList.toggle('active',t==='grow');
  document.getElementById('btnHarvest').classList.toggle('active',t==='harvest');
  document.getElementById('btnHarvest').classList.toggle('harvest-mode',t==='harvest');
  renderToday(TODAY);
}

function renderToday(date){
  _tid=0;
  const dow=date.getDay(),isWknd=dow===0||dow===6;
  document.getElementById('todayTitle').textContent=fmtShort(date);
  document.getElementById('todayDow').textContent=DOW_NAMES[dow];
  document.getElementById('todayNote').textContent=dow===2?'Fungicide day':dow===3?'Drench day':dow===4?'Foliar day':dow===5?'IPM spray day':'';

  const grid=document.getElementById('roomsGrid');
  if(isWknd){
    grid.innerHTML=`<div class="weekend-banner"><h2>Weekend</h2><p>No scheduled work. Next workday: ${fmtShort(addDays(date,dow===6?2:1))}</p></div>`;
    return;
  }

  const roomIds=ROOM_ORDER.filter(id=>CYCLES.some(c=>c.id===id));
  const calEv=CAL_EVENTS[dk(date)]||{};
  let html='';

  roomIds.forEach((roomId,ri)=>{
    const cycle=getActiveCycle(roomId,date);
    const meta=Object.values(ROOM_META).find(m=>m.id===roomId);
    const wki=cycle?getWeekInfo(cycle,date):null;
    const fd=cycle?flowerDay(cycle,date):null;
    const delay=ri*0.05;

    const phaseLabel=!wki?'Inactive':wki.phase==='clone'?'Clone':wki.phase==='transplant'?'Transplant':wki.phase==='flip'?'Flip day':wki.weekNum===7?`Late Bulk · Day ${fd||'–'}`:`Wk${wki.weekNum} · Day ${fd||'–'}`;
    const isActive=!!wki;

    if(currentTrack==='harvest'){
      const ht=[];
      ['HARVEST','BUCK','FLIP'].forEach(tp=>{if(calEv[tp]?.includes(roomId))HARVEST_TASKS[tp].forEach(t=>ht.push(t));});
      const act=ht.length>0;
      html+=`<div class="room-card${!act?' offline':''}" style="animation-delay:${delay}s">
        <div class="room-card-header"><div class="room-dot" style="background:${meta.color}"></div><div class="room-id">${roomId}</div>
        <div class="room-phase" style="${act?'color:var(--harvest-c)':''}">${act?'Active today':'No harvest activity'}</div></div>
        <div class="room-card-body"><div class="tasks-list">`;
      if(!act)html+=`<div class="no-tasks">No harvest tasks scheduled today</div>`;
      else ht.forEach(t=>{html+=taskHTML(t);});
      html+=`</div></div></div>`;
      return;
    }

    // GROW TRACK
    const wkDef=wki?.weekNum?WEEK_DEF[wki.weekNum]:null;
    const sprays=(wki?.phase==='flower'&&wki.weekNum)?getSprayTasks(cycle,date,wki.weekNum):[];

    // Plant work — show on first workday of flower week
    let plantWork=[];
    if(wkDef?.plantWork?.length&&wki?.phase==='flower'&&cycle.flipDate){
      let showDay=addDays(cycle.flipDate,(wki.weekNum-1)*7+1);
      while(showDay.getDay()===0||showDay.getDay()===6)showDay=addDays(showDay,1);
      if(dk(date)===dk(showDay))plantWork=wkDef.plantWork;
    }

    // Veg tasks
    const vegTasks=[];
    if(wki?.phase==='clone')vegTasks.push({label:'Clone cut — in progress',tag:'clone',cls:'t-clone',products:[],notes:'1–2 days to complete'});
    if(wki?.phase==='transplant')vegTasks.push({label:'Transplant to flower pots',tag:'ops',cls:'t-ops',products:[],notes:'2–3 days to complete'});
    if((wki?.phase==='clone'||wki?.phase==='transplant')&&dow===2)vegTasks.push({label:'IPM / Fungicide — veg',tag:'fungicide',cls:'t-fungicide',products:['Veg IPM (TBD)'],notes:'Lights off · WPS posted'});
    if((wki?.phase==='clone'||wki?.phase==='transplant')&&dow===4)vegTasks.push({label:'Foliar spray — veg',tag:'foliar',cls:'t-foliar',products:['Veg foliar (TBD)'],notes:'Before lights on'});

    const watchItems=wkDef?.watchItems||[];
    const allEmpty=!isActive||(plantWork.length+sprays.length+vegTasks.length+watchItems.length===0&&!wkDef);

    html+=`<div class="room-card${!isActive?' offline':''}" style="animation-delay:${delay}s">
      <div class="room-card-header"><div class="room-dot" style="background:${meta.color}"></div><div class="room-id">${roomId}</div><div class="room-phase">${phaseLabel}</div></div>
      <div class="room-card-body">`;
    if(wkDef?.heavy)html+=`<div class="plant-work-badge">⚑ ${wkDef.heavyLabel}</div>`;
    if(wkDef?.objective)html+=`<div class="room-objective">${wkDef.objective}</div>`;
    html+=`<div class="tasks-list">`;
    if(!isActive)html+=`<div class="no-tasks">Room not active this cycle</div>`;
    else if(allEmpty)html+=`<div class="no-tasks">No scheduled tasks today</div>`;
    else{
      if(vegTasks.length){html+=sectionHdr('Veg / clone room');vegTasks.forEach(t=>{html+=taskHTML(t);});}
      if(plantWork.length){html+=sectionHdr('Plant work');plantWork.forEach(t=>{html+=taskHTML({label:t,tag:'ops',cls:'t-ops',products:[],notes:''});});}
      if(sprays.length){html+=sectionHdr('Sprays & drenches');sprays.forEach(t=>{html+=taskHTML(t);});}
      if(watchItems.length){html+=sectionHdr('Weekly watch',true);watchItems.forEach(w=>{html+=taskHTML({label:w,tag:'watch',cls:'t-watch',products:[],notes:''});});}
    }
    html+=`</div></div></div>`;
  });

  grid.innerHTML=html;
}

// ── WEEK VIEW ─────────────────────────────────────────────────────────────
function renderWeek(date){
  const dow=date.getDay(),mon=addDays(date,dow===0?-6:1-dow);
  const days=Array.from({length:5},(_,i)=>addDays(mon,i));
  document.getElementById('weekRange').textContent=`${fmtShort(days[0])} – ${fmtShort(days[4])}`;

  const roomIds=ROOM_ORDER.filter(id=>CYCLES.some(c=>c.id===id));
  let html=`<div class="week-grid"><div class="wg-header">Room</div>`;
  days.forEach(d=>{const it=dk(d)===dk(date);html+=`<div class="wg-header${it?' today-col':''}">${DOW_SHORT[d.getDay()]} ${d.getDate()}</div>`;});

  roomIds.forEach(roomId=>{
    const meta=Object.values(ROOM_META).find(m=>m.id===roomId);
    const c0=getActiveCycle(roomId,days[0]),wk0=c0?getWeekInfo(c0,days[0]):null;
    const ph=!wk0?'—':wk0.phase==='flower'?`Wk${wk0.weekNum}`:wk0.phase==='clone'?'Clone':wk0.phase==='transplant'?'Transpl.':'Flip';
    html+=`<div class="wg-room-label"><div class="wg-room-name" style="color:${meta.color}">${roomId}</div><div class="wg-room-phase">${ph}</div></div>`;

    days.forEach(d=>{
      const it=dk(d)===dk(date),ev=CAL_EVENTS[dk(d)]||{};
      const cyc=getActiveCycle(roomId,d),wki=cyc?getWeekInfo(cyc,d):null;
      const sprs=(wki?.phase==='flower'&&wki.weekNum)?getSprayTasks(cyc,d,wki.weekNum):[];
      html+=`<div class="wg-cell${it?' today-col':''}">`;
      if(wki?.phase==='flower'&&WEEK_DEF[wki.weekNum]?.heavy)html+=`<div class="wg-task t-watch">⚑ Heavy</div>`;
      if(ev.HARVEST?.includes(roomId))html+=`<div class="wg-task t-harvest">Harvest</div>`;
      if(ev.BUCK?.includes(roomId))html+=`<div class="wg-task t-buck">Buck</div>`;
      if(ev.FLIP?.includes(roomId))html+=`<div class="wg-task t-flip">Flip</div>`;
      if(ev.CLONE?.includes(roomId))html+=`<div class="wg-task t-clone">Clone</div>`;
      if(ev.TRANSPLANT?.includes(roomId))html+=`<div class="wg-task t-ops">Transplant</div>`;
      sprs.forEach(t=>{const s=t.tag==='fungicide'?'Fungicide':t.tag==='drench'?'Drench':t.tag==='foliar'?'Foliar':'IPM';html+=`<div class="wg-task t-${t.tag}">${s}</div>`;});
      html+=`</div>`;
    });
  });

  html+=`</div>`;
  document.getElementById('weekGrid').innerHTML=html;
}

// ── CALENDAR VIEW ─────────────────────────────────────────────────────────
let calMonth=new Date().getMonth(),calYear=new Date().getFullYear();

function renderCalendar(){
  const today=new Date(),fd=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate();
  document.getElementById('calMonthName').textContent=MONTH_NAMES[calMonth]+' '+calYear;

  const milestones=[];
  for(let d=1;d<=dim;d++){
    const date=new Date(calYear,calMonth,d),ev=CAL_EVENTS[dk(date)];
    if(!ev)continue;
    ['HARVEST','FLIP','CLONE'].forEach(tp=>{if(ev[tp])ev[tp].forEach(room=>milestones.push({date,tp,room}));});
  }

  document.getElementById('milestoneStrip').innerHTML=milestones
    .filter((m,i,a)=>a.findIndex(x=>dk(x.date)===dk(m.date)&&x.tp===m.tp&&x.room===m.room)===i)
    .slice(0,10).map(m=>{
      const meta=Object.values(ROOM_META).find(r=>r.id===m.room)||{color:'#888'};
      const colors={HARVEST:'var(--harvest-c)',FLIP:'var(--flip-c)',CLONE:'var(--clone-c)'};
      return`<div class="milestone-pill"><div class="mp-dot" style="background:${meta.color}"></div><span class="mp-room">${m.room}</span><span class="mp-label" style="color:${colors[m.tp]}">${m.tp.charAt(0)+m.tp.slice(1).toLowerCase()}</span><span class="mp-date">${fmtShort(m.date)}</span></div>`;
    }).join('');

  const colors={HARVEST:{bg:'var(--harvest-bg)',c:'var(--harvest-c)'},BUCK:{bg:'var(--buck-bg)',c:'var(--buck-c)'},FLIP:{bg:'var(--flip-bg)',c:'var(--flip-c)'},CLONE:{bg:'var(--clone-bg)',c:'var(--clone-c)'},TRANSPLANT:{bg:'var(--surface2)',c:'var(--muted)'}};
  let html=`<div class="cal-grid">`;
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>html+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<fd;i++)html+=`<div class="cal-cell empty"></div>`;

  for(let day=1;day<=dim;day++){
    const date=new Date(calYear,calMonth,day),dow=date.getDay();
    const isToday=dk(date)===dk(today),isWknd=dow===0||dow===6;
    const ev=CAL_EVENTS[dk(date)]||{};
    html+=`<div class="cal-cell${isToday?' cal-today':isWknd?' weekend':''}"><span class="cal-day-num">${day}</span>`;
    ['HARVEST','BUCK','FLIP','CLONE','TRANSPLANT'].forEach(tp=>{
      if(!ev[tp])return;
      const c=colors[tp],label=tp==='TRANSPLANT'?'Transpl.':tp.charAt(0)+tp.slice(1).toLowerCase();
      [...new Set(ev[tp])].forEach(room=>{html+=`<div class="cal-event" style="background:${c.bg};color:${c.c}">${room} ${label}</div>`;});
    });
    html+=`</div>`;
  }

  const tail=(7-((fd+dim)%7))%7;
  for(let i=0;i<tail;i++)html+=`<div class="cal-cell empty"></div>`;
  html+=`</div>`;
  document.getElementById('calGrid').innerHTML=html;
}

init();
